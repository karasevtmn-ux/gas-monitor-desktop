name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip && pip install -r requirements.txt && pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --clean --noconsole --onedir --name GASMonitor app.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer\GASMonitor.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GASMonitor-Installer
          path: installer/Output/GASMonitor-Setup.exe
